<!DOCTYPE html>
{% load static %}
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <title>{% block title %}Library of Cat Breeds{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'catlibrary:home' %}">
                    <img style="height: 50px;" src="{% static 'images/cat.png' %}" alt="Logo" />
                    <span class="fw-semibold">Cat Library</span>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link btn btn-warning" href="{% url 'catlibrary:home' %}">
                                Главная
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-warning" href="{% url 'catlibrary:about' %}">О нас</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-warning" href="{% url 'catlibrary:care' %}">
                                Уход
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-warning" href="{% url 'catlibrary:faq' %}">FAQ</a>
                        </li>
                    </ul>

                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Найти породу..."
                            aria-label="Search">
                        <button class="btn btn-outline-primary" type="submit">Искать</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-body-tertiary border-top py-4">
        <div class="container">
            <div class="row gy-2">
                <div class="col-md-6">
                    <div class="fw-semibold">© 2026 Холод В. A. Все права защищены</div>
                    <div class="text-muted"> Library of Cat Breeds</div>
                </div>
                <div class="col-md-6 text-md-end">
                    <div>Связь с нами:</div>
                    <a class="text-decoration-none" href="#">VK</a>
                    <span class="text-muted">•</span>
                    <a class="text-decoration-none" href="#">Mail</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
